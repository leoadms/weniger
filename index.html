<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Site</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: #f4f3ed;
    }
    body {
      display: flex;
      align-items: center;      /* vertical centering */
      justify-content: center;  /* horizontal centering */
    }
    img {
      /* 33vmin = 33% of the smaller screen dimension.
         Change 33 to 10 if you want it at 10% instead. */
      width: 10vmin;
      height: auto;
    }
  </style>
</head>
<body>
  <img src="logo.jpg" alt="Site logo">
</body>
</html>
